<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adham Developer</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

/* صفحة تسجيل الدخول */
.login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

button{
  padding:12px 20px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#2563eb;
  color:white;
  font-size:16px;
}

/* الصفحة الرئيسية */
.main{
  display:none;
  padding:20px;
}

h1{
  color:#38bdf8;
}

/* الأزرار */
.btn{
  display:block;
  margin:10px auto;
  width:200px;
}

/* أيقونة المطور */
.dev-icon{
  position:fixed;
  bottom:15px;
  right:15px;
  background:#1e293b;
  padding:10px 15px;
  border-radius:20px;
  font-size:14px;
}
</style>

</head>
<body>

<!-- تسجيل الدخول -->
<div class="login" id="loginPage">
  <h2>تسجيل الدخول</h2>
  <button onclick="enterSite()">دخول</button>
</div>

<!-- الصفحة الرئيسية -->
<div class="main" id="mainPage">
  <h1>Developer Adham</h1>

  <button class="btn">الترجمة</button>
  <button class="btn">AI ومساعدة</button>
  <button class="btn">الزخرفة</button>
  <button class="btn">البحث</button>

  <div class="dev-icon">
    📞 +201014962157
  </div>
</div>

<script>
function enterSite(){
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("mainPage").style.display = "block";
}
</script>

</body>
</html>
